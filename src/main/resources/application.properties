# ==========================================
# Application Configuration
# ==========================================
spring.application.name=securenote

# ==========================================
# H2 In-Memory Database Configuration
# ==========================================
spring.datasource.url=jdbc:h2:mem:securenotedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for dev/testing - accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Server Configuration
# ==========================================
server.port=8084

# ==========================================
# Logging
# ==========================================
logging.level.org.springframework.security=DEBUG
logging.level.com.example.securenotes=DEBUG